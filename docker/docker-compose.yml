# MIMIC-Extract Docker Compose

services:
  postgres:
    image: postgres:15
    shm_size: '8gb'
    environment:
      POSTGRES_USER: mimic
      POSTGRES_PASSWORD: mimic
      POSTGRES_DB: mimic
    command: postgres -c max_wal_size=2GB -c checkpoint_timeout=30min
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimic -d mimic"]
      interval: 5s
      timeout: 5s
      retries: 5

  mimic-extract:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: mimic
      PGUSER: mimic
      PGPASSWORD: mimic
      MIMIC_CODE_DIR: /opt/mimic-code
      MIMIC_EXTRACT_CODE_DIR: /opt/mimic-extract
      MIMIC_EXTRACT_OUTPUT_DIR: /opt/mimic-extract/data/curated/default
      MIMIC_DATA_DIR: /mimic_data
      POP_SIZE: 0
      NUMERICS_BATCH_SIZE: 0
    volumes:
      # Mount for MIMIC-III CSV files 
      - ../data/mimiciii/1.4:/mimic_data:ro
      # For output
      - ../data/curated:/opt/mimic-extract/data/curated

volumes:
  postgres_data:
